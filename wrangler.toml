name = "rabava-portfolio-telegram-bot"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Per-user order sessions (carts + checkout state).
[[kv_namespaces]]
binding = "SESSIONS"
id = "a93400b42cd5448291f58e943228d461"

# Secrets are NOT stored here — they live in the Cloudflare dashboard
# (Settings → Variables and Secrets) and persist across deploys:
#   BOT_TOKEN       — from @BotFather
#   OWNER_CHAT_ID   — your numeric Telegram chat id (orders go here)
#   WEBHOOK_SECRET  — random string; also verifies the /__register route
#
# To (re)point Telegram at this worker after a deploy, open once in a browser:
#   https://<worker-url>/__register?key=<WEBHOOK_SECRET>
